<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ColorFlipper</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="images/png" href="images/logo.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-wrapper">
        <div class="brand">ColorFlipper</div>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </div>
    </nav>

    <!-- Main Container-->
    <div class="container">
      <h1>ColorFlipper</h1>
      <div class="btn-group">
        <button id="red" onclick="setColor('red')">Red</button>
        <button id="green" onclick="setColor('green')">Green</button>
        <button id="blue" onclick="setColor('blue')">Blue</button>
        <button id="random" onclick="randomColor()">Random</button>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="footer-bottom">
        <p>&copy; 2026 ColorFlipper. All Rights Reserved.</p>
        <p class="developer">
          Designed & Developed by:
          <a
            href="https://github.com/sutanjoyb"
            target="_blank"
            class="github-link"
          >
            <i class="fa-brands fa-github"></i>
            Sutanjoy Bhattacharjee
          </a>
        </p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
